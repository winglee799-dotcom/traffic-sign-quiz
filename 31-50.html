<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>驾校一点通 · 交通标志专项训练 (31-50 题)</title>
<style>
  :root {
    --bg-primary: #0b0f19;
    --bg-secondary: #161f30;
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --success: #10b981;
    --error: #ef4444;
    --warning: #f59e0b;
    --border: #23354f;
    --card-shadow: 0 12px 40px -15px rgba(0, 0, 0, 0.7);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    transition: all 0.2s ease;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background-color: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  .container {
    max-width: 960px;
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 20px;
    margin-top: 10px;
  }

  @media (max-width: 768px) {
    .container {
      grid-template-columns: 1fr;
    }
  }

  header {
    width: 100%;
    max-width: 960px;
    background-color: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    box-shadow: var(--card-shadow);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand h1 {
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, #60a5fa, #2563eb);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .tag {
    font-size: 11px;
    background: rgba(37, 99, 235, 0.15);
    color: #60a5fa;
    padding: 2px 8px;
    border-radius: 99px;
    border: 1px solid rgba(37, 99, 235, 0.3);
    font-weight: 600;
  }

  .timer-container {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--warning);
    font-weight: 700;
    font-size: 15px;
    border: 1px solid rgba(245, 158, 11, 0.35);
    border-radius: 8px;
    padding: 8px 12px;
    background: rgba(245, 158, 11, 0.08);
  }

  .timer-container.timer-danger {
    color: var(--error);
    border-color: rgba(239, 68, 68, 0.5);
    background: rgba(239, 68, 68, 0.12);
  }

  .timer-icon {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    stroke-width: 2.5;
    fill: none;
  }

  .quiz-area {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card {
    background-color: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    box-shadow: var(--card-shadow);
    display: flex;
    flex-direction: column;
    gap: 24px;
    min-height: 480px;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    padding-bottom: 14px;
  }

  .q-number {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
  }

  .sign-display {
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    height: 180px;
    overflow: hidden;
  }

  .sign-display svg {
    width: 140px;
    height: 140px;
    display: block;
    flex: none;
  }

  .q-text {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.5;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .option-btn {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 12px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    text-align: left;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .option-btn:hover:not(.locked) {
    border-color: var(--accent);
    background: rgba(37, 99, 235, 0.05);
  }

  .option-badge {
    width: 24px;
    height: 24px;
    border-radius: 99px;
    border: 1.5px solid var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }

  /* 答题判定样式 */
  .option-btn.selected {
    background-color: rgba(37, 99, 235, 0.15) !important;
    border-color: var(--accent) !important;
    color: var(--text-primary) !important;
  }
  .option-btn.selected .option-badge {
    border-color: var(--accent) !important;
    background-color: var(--accent) !important;
    color: white !important;
  }

  .option-btn.correct {
    background-color: rgba(16, 185, 129, 0.12) !important;
    border-color: var(--success) !important;
    color: var(--success) !important;
  }
  .option-btn.correct .option-badge {
    border-color: var(--success) !important;
    background-color: var(--success) !important;
    color: white !important;
  }

  .option-btn.incorrect {
    background-color: rgba(239, 68, 68, 0.12) !important;
    border-color: var(--error) !important;
    color: var(--error) !important;
  }
  .option-btn.incorrect .option-badge {
    border-color: var(--error) !important;
    background-color: var(--error) !important;
    color: white !important;
  }

  .explanation {
    background: rgba(16, 185, 129, 0.06);
    border: 1px dashed rgba(16, 185, 129, 0.3);
    border-radius: 10px;
    padding: 16px;
    font-size: 13.5px;
    line-height: 1.6;
    margin-top: 10px;
    animation: slideDown 0.3s ease;
  }

  .explanation strong {
    color: var(--success);
    display: block;
    margin-bottom: 4px;
  }

  .nav-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .btn {
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-primary);
  }

  .btn:hover:not(:disabled) {
    background-color: rgba(255, 255, 255, 0.05);
    border-color: var(--text-secondary);
  }

  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .btn-submit {
    background-color: var(--success);
    color: white;
    border-color: var(--success);
  }

  .btn-submit:hover {
    background-color: #059669 !important;
  }

  /* 侧边栏：答题卡 */
  .sidebar {
    background-color: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    box-shadow: var(--card-shadow);
    display: flex;
    flex-direction: column;
    gap: 16px;
    height: fit-content;
  }

  .sidebar-title {
    font-size: 14px;
    font-weight: 700;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
    display: flex;
    justify-content: space-between;
  }

  .sheet-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }

  .sheet-item {
    aspect-ratio: 1;
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text-secondary);
  }

  .sheet-item:hover {
    border-color: var(--accent);
    color: var(--text-primary);
  }

  .sheet-item.active {
    background-color: var(--accent) !important;
    border-color: var(--accent) !important;
    color: white !important;
    box-shadow: 0 0 10px rgba(37, 99, 235, 0.4);
  }

  .sheet-item.answered {
    background-color: rgba(37, 99, 235, 0.16);
    border-color: var(--accent);
    color: #93c5fd;
  }

  .sheet-item.correct {
    background-color: rgba(16, 185, 129, 0.15) !important;
    border-color: var(--success) !important;
    color: var(--success) !important;
  }

  .sheet-item.incorrect {
    background-color: rgba(239, 68, 68, 0.15) !important;
    border-color: var(--error) !important;
    color: var(--error) !important;
  }

  .stat-box {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 10px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }

  .stat-item span {
    font-weight: 700;
  }

  /* 成绩结算弹窗 */
  .result-modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: rgba(11, 15, 25, 0.9);
    backdrop-filter: blur(8px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.4s ease;
  }

  .result-card {
    background-color: var(--bg-secondary);
    border: 1px solid var(--border);
    max-width: 480px;
    width: 100%;
    border-radius: 20px;
    padding: 36px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    gap: 20px;
    animation: scaleUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .score-circle {
    width: 130px;
    height: 130px;
    border-radius: 999px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 6px solid var(--accent);
    box-shadow: 0 0 20px rgba(37, 99, 235, 0.2);
  }

  .score-val {
    font-size: 40px;
    font-weight: 800;
  }

  .score-label {
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 1px;
  }

  .result-status {
    font-size: 22px;
    font-weight: 700;
  }

  .status-pass { color: var(--success); }
  .status-fail { color: var(--error); }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes scaleUp {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
      <line x1="9" y1="3" x2="9" y2="21"/>
    </svg>
    <h1>科目一 · 交通标志对比训练</h1>
    <span class="tag">第 31–50 题</span>
  </div>
  <div class="header-actions">
    <div class="timer-container" id="timer-box">
      <svg class="timer-icon" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      <span id="time-display">15:00</span>
    </div>
    <button class="btn" style="font-size: 12px; padding: 6px 12px;" onclick="resetProgress()">重新开考</button>
  </div>
</header>

<div class="container">
  <!-- 答题区 -->
  <div class="quiz-area">
    <div class="card">
      <div class="card-header">
        <span class="q-number" id="q-num-label">第 31 题</span>
        <span class="tag" style="background: rgba(16, 185, 129, 0.1); color: var(--success); border-color: rgba(16, 185, 129, 0.2);" id="q-category">警告标志</span>
      </div>

      <!-- 标志展示框 -->
      <div class="sign-display" id="sign-box">
        <!-- SVG代码 -->
      </div>

      <div class="q-text" id="q-text-label">题目加载中...</div>

      <div class="options-grid" id="options-box">
        <!-- 选项 -->
      </div>

      <!-- 记忆法解析 -->
      <div class="explanation" id="explanation-box" style="display: none;">
        <strong>💡 Wing 大白话记忆法：</strong>
        <span id="explanation-text"></span>
      </div>

      <div class="nav-bar">
        <button class="btn" id="btn-prev" onclick="changeQuestion(-1)">上一题</button>
        
        <button class="btn btn-submit" id="btn-submit" onclick="submitExam()">交卷结算</button>

        <button class="btn" id="btn-next" onclick="changeQuestion(1)">下一题</button>
      </div>
    </div>
  </div>

  <!-- 侧边栏：答题卡 -->
  <div class="sidebar">
    <div class="sidebar-title">
      <span id="sheet-title-text">考试答题卡</span>
      <span style="color: var(--accent);" id="progress-text">0 / 20</span>
    </div>
    
    <div class="sheet-grid" id="sheet-grid-box">
      <!-- 题号卡片 -->
    </div>

    <div class="stat-box" id="stat-row" style="display: none;">
      <div class="stat-item">正确：<span style="color: var(--success);" id="stat-correct">0</span></div>
      <div class="stat-item">错误：<span style="color: var(--error);" id="stat-wrong">0</span></div>
    </div>
  </div>
</div>

<!-- 成绩结算弹窗 -->
<div class="result-modal" id="result-modal">
  <div class="result-card">
    <h2 style="font-size: 24px; font-weight: 800;">考试成绩评估报告</h2>
    <div class="score-circle" id="result-score-circle">
      <span class="score-val" id="result-score">0</span>
      <span class="score-label">分</span>
    </div>
    <div class="result-status" id="result-status-text">未通过</div>
    <div style="font-size: 13.5px; color: var(--text-secondary); line-height: 1.6;">
      考试时间限额: 15 分钟 | 合格标准: 90 分<br>
      <span id="result-stat-details">交卷后显示答对、答错、未答数量。</span>
    </div>
    <div style="display: flex; gap: 12px; justify-content: center; margin-top: 10px; flex-wrap: wrap;">
      <button class="btn" onclick="closeResultModal()">查看试卷</button>
      <button class="btn btn-submit" onclick="restartExam()">重新考试</button>
      <button class="btn" style="background:#10b981;border-color:#10b981;" onclick="copyReport()">📋 复制成绩</button>
    </div>
  </div>
</div>

<script src="./telegram-config.js"></script>
<script>
  // 原始20道标志对比图题库数据
  const originalQuestions = [
    {
      id: 31,
      category: "禁令标志",
      question: "图中的交通标志表示什么含义？",
      svg: `<svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="50" fill="white" stroke="#d32f2f" stroke-width="6"/><line x1="30" y1="60" x2="90" y2="60" stroke="#d32f2f" stroke-width="12"/></svg>`,
      options: {
        A: "禁止通行",
        B: "禁止驶入",
        C: "禁止停车",
        D: "禁止掉头"
      },
      answer: "B",
      hint: "红圈 + 白色单横杠 = 禁止驶入！这代表禁止一切车辆驶入，但是允许车辆开出来（比如单行线的出口）。注意跟“禁止通行”区分。"
    },
    {
      id: 32,
      category: "禁令标志",
      question: "图中的交通标志表示什么含义？",
      svg: `<svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="50" fill="white" stroke="#d32f2f" stroke-width="8"/><line x1="32" y1="32" x2="88" y2="88" stroke="#d32f2f" stroke-width="8"/><line x1="88" y1="32" x2="32" y2="88" stroke="#d32f2f" stroke-width="8"/></svg>`,
      options: {
        A: "禁止长时间停车",
        B: "禁止临时停车",
        C: "禁止停车",
        D: "禁止一切车辆通行"
      },
      answer: "C",
      hint: "红圈 + 黑色大叉叉 ✕ = 禁止停车！这属于完全禁止，不管你临时停几秒，只要轮子停下就是违章。"
    },
    {
      id: 33,
      category: "禁令标志",
      question: "图中的交通标志表示什么含义？",
      svg: `<svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="50" fill="white" stroke="#d32f2f" stroke-width="8"/><line x1="32" y1="32" x2="88" y2="88" stroke="#d32f2f" stroke-width="8"/></svg>`,
      options: {
        A: "禁止停车",
        B: "禁止长时间停车",
        C: "允许长时间停车",
        D: "临时停车区域"
      },
      answer: "B",
      hint: "红圈 + 单红斜杠 \\ = 禁止长时间停车！意思是这里不能做停车场，但如果即停即走（如上下人，即停即走），是允许临时靠边停一下的。"
    },
    {
      id: 34,
      category: "禁令标志",
      question: "图中的交通标志表示什么含义？",
      svg: `<svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="50" fill="white" stroke="#d32f2f" stroke-width="8"/></svg>`,
      options: {
        A: "禁止驶入",
        B: "禁止停车",
        C: "会车让行",
        D: "禁止通行"
      },
      answer: "D",
      hint: "红圈白底 + 里面干干净净什么都没有 = 禁止通行！代表前方有危险或者此路已断，人和车绝对不允许以任何形式进入。"
    },
    {
      id: 35,
      category: "指示标志",
      question: "图中的交通标志表示什么含义？",
      svg: `<svg viewBox="0 0 120 120"><rect x="10" y="10" width="100" height="100" rx="8" fill="#1976d2"/><text x="60" y="75" text-anchor="middle" font-size="54" font-weight="bold" fill="white" font-family="Arial">P</text></svg>`,
      options: {
        A: "允许临时停车",
        B: "停车场",
        C: "禁止停车",
        D: "限时停车"
      },
      answer: "B",
      hint: "蓝色方形底 + 白色大写 P = 停车场！这是经典的指示标志，告诉你前方有正规的机动车停车场。"
    },
    {
      id: 36,
      category: "禁令标志",
      question: "图中的交通标志表示什么含义？",
      svg: `<svg viewBox="0 0 120 120"><rect x="10" y="10" width="100" height="100" rx="8" fill="#1976d2"/><text x="60" y="75" text-anchor="middle" font-size="54" font-weight="bold" fill="white" font-family="Arial">P</text><line x1="30" y1="28" x2="90" y2="92" stroke="#d32f2f" stroke-width="8"/></svg>`,
      options: {
        A: "停车场",
        B: "临时停车",
        C: "禁止停车",
        D: "禁止长时间停车"
      },
      answer: "D",
      hint: "蓝色方形P + 红色斜线 = 禁止长时间停车！这个和红圈斜线作用相同，只是在画了停车位的区域或者城市特定路段设置，表示允许临时即停即走，但不准长期占道。"
    },
    {
      id: 37,
      category: "禁令标志",
      question: "图中的交通标志表示什么含义？",
      svg: `<svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="50" fill="white" stroke="#d32f2f" stroke-width="8"/><text x="60" y="75" text-anchor="middle" font-size="44" font-weight="bold" fill="#333" font-family="Arial">40</text></svg>`,
      options: {
        A: "最低限速 40 公里/小时",
        B: "最高限速 40 公里/小时",
        C: "解除限速 40 公里/小时",
        D: "建议速度 40 公里/小时"
      },
      answer: "B",
      hint: "白底红圈 + 黑色数字 = 最高限速！红圈代表警告和限制。这表示在该路段开车的最高时速绝对不能超过数字“40”。"
    },
    {
      id: 38,
      category: "指示标志",
      question: "图中的交通标志表示什么含义？",
      svg: `<svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="50" fill="#1976d2"/><text x="60" y="75" text-anchor="middle" font-size="44" font-weight="bold" fill="white" font-family="Arial">40</text></svg>`,
      options: {
        A: "最高限速 40 公里/小时",
        B: "建议速度 40 公里/小时",
        C: "最低限速 40 公里/小时",
        D: "高度限制 4 米"

  const EXAM_SECONDS = 15 * 60;
  const OPTION_LABELS = ['A', 'B', 'C', 'D'];
  const TELEGRAM_REPORT_ENDPOINT = (window.QUIZ_TELEGRAM_REPORT_ENDPOINT || '').trim();
  let activeQuestions = [];
  let currentIdx = 0;
  let userAnswers = {};
  let hasSubmittedExam = false;
  let timerInterval = null;
  let examTimeLeft = EXAM_SECONDS;
  let examDeadline = 0;
  let examStartedAt = 0;

  document.addEventListener('DOMContentLoaded', startNewExam);

  function shuffle(array) {
    const copy = [...array];
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function createExamQuestion(question) {
    const shuffledKeys = shuffle(OPTION_LABELS);
    const shuffledOptions = shuffledKeys.map((originalKey, index) => ({
      label: OPTION_LABELS[index],
      originalKey,
      text: question.options[originalKey]
    }));
    const answerLabel = shuffledOptions.find(option => option.originalKey === question.answer).label;
    return { ...question, shuffledOptions, answerLabel };
  }

  function startNewExam() {
    if (timerInterval) clearInterval(timerInterval);
    closeResultModal();
    currentIdx = 0;
    userAnswers = {};
    hasSubmittedExam = false;
    examTimeLeft = EXAM_SECONDS;
    examStartedAt = Date.now();
    activeQuestions = shuffle(originalQuestions).map(createExamQuestion);

    document.getElementById('btn-submit').style.display = 'inline-block';
    document.getElementById('btn-submit').disabled = false;
    document.getElementById('stat-row').style.display = 'none';
    document.getElementById('sheet-title-text').innerText = '考试答题卡';

    initSheet();
    loadQuestion(0);
    updateStats();
    startTimer();
  }

  function startTimer() {
    examDeadline = Date.now() + EXAM_SECONDS * 1000;
    tickTimer();
    timerInterval = setInterval(tickTimer, 250);
  }

  function tickTimer() {
    if (hasSubmittedExam) return;
    examTimeLeft = Math.max(0, Math.ceil((examDeadline - Date.now()) / 1000));
    updateTimerDisplay();
    if (examTimeLeft <= 0) {
      submitExam(true);
    }
  }

  function updateTimerDisplay() {
    const min = Math.floor(examTimeLeft / 60);
    const sec = examTimeLeft % 60;
    const timerBox = document.getElementById('timer-box');
    document.getElementById('time-display').innerText =
      `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    timerBox.classList.toggle('timer-danger', examTimeLeft <= 60);
  }

  function buildTelegramReportPayload(isForced, correctCount, wrongCount, unansweredCount, finalScore) {
    const wrongQuestions = activeQuestions
      .map((q, index) => {
        const selected = userAnswers[q.id] || '未答';
        return {
          index: index + 1,
          id: q.id,
          category: q.category,
          selected,
          correct: q.answerLabel,
          question: q.question
        };
      })
      .filter(item => item.selected !== item.correct);

    const usedSeconds = examStartedAt
      ? Math.max(0, Math.floor((Date.now() - examStartedAt) / 1000))
      : 0;

    return {
      score: finalScore,
      correctCount,
      wrongCount,
      unansweredCount,
      totalCount: activeQuestions.length,
      usedSeconds,
      passed: finalScore >= 90,
      forceSubmit: isForced,
      wrongQuestions,
      submittedAtLocal: new Date().toLocaleString('zh-CN', { hour12: false }),
      page: `${document.title} | ${location.href}`
    };
  }

  async function sendTelegramReport(payload) {
    if (!TELEGRAM_REPORT_ENDPOINT) return;
    if (!/^https?:\/\//i.test(TELEGRAM_REPORT_ENDPOINT)) return;

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 6000);

    try {
      const response = await fetch(TELEGRAM_REPORT_ENDPOINT, {
        method: 'POST',
        headers: {
          'content-type': 'application/json'
        },
        body: JSON.stringify(payload),
        cache: 'no-store',
        credentials: 'omit',
        keepalive: true,
        mode: 'cors',
        signal: controller.signal
      });
      if (!response.ok) {
        console.warn('Telegram report failed with HTTP status:', response.status);
      }
    } catch (error) {
      console.warn('Telegram report failed:', error);
    } finally {
      clearTimeout(timeoutId);
    }
  }

          svgNode('polygon', { points: '60,10 110,105 10,105', fill: '#f9a825', stroke: '#333', 'stroke-width': '2' }),
          add(svgNode('g', { transform: 'translate(50,65) scale(1.2)' }), [
            svgNode('line', { x1: '0', y1: '0', x2: '18', y2: '0', stroke: '#333', 'stroke-width': '2' }),
            svgNode('circle', { cx: '18', cy: '-5', r: '2', fill: '#333' }),
            svgNode('line', { x1: '18', y1: '-5', x2: '22', y2: '-12', stroke: '#333', 'stroke-width': '2' })
          ])
        ]);
      case 49:
        return add(svg, [
          svgNode('polygon', { points: '60,10 110,105 10,105', fill: '#f9a825', stroke: '#333', 'stroke-width': '2' }),
          drawText('60', '50', 'N', '20'),
          drawText('60', '80', 'Z', '20')
        ]);
      case 50:
        return add(svg, [
          svgNode('polygon', { points: '60,10 110,105 10,105', fill: '#f9a825', stroke: '#333', 'stroke-width': '2' }),
          svgNode('line', { x1: '30', y1: '75', x2: '90', y2: '75', stroke: '#333', 'stroke-width': '4' }),
          svgNode('line', { x1: '55', y1: '55', x2: '60', y2: '35', stroke: '#333', 'stroke-width': '3' }),
          svgNode('line', { x1: '65', y1: '55', x2: '60', y2: '35', stroke: '#333', 'stroke-width': '3' })
        ]);
      default:
        return null;
    }
  }

  function initSheet() {
    const grid = document.getElementById('sheet-grid-box');
    grid.innerHTML = '';
    activeQuestions.forEach((q, idx) => {
      const btn = document.createElement('div');
      btn.className = 'sheet-item';
      btn.id = `sheet-btn-${idx}`;
      btn.innerText = idx + 1;
      btn.onclick = () => jumpTo(idx);
      refreshSheetItemColor(btn, q);
      grid.appendChild(btn);
    });
  }

  function refreshSheetItemColor(btn, q) {
    if (hasSubmittedExam) {
      btn.className = userAnswers[q.id] === q.answerLabel ? 'sheet-item correct' : 'sheet-item incorrect';
      return;
    }
    btn.className = userAnswers[q.id] ? 'sheet-item answered' : 'sheet-item';
  }

  function loadQuestion(idx) {
    currentIdx = idx;
    const q = activeQuestions[idx];

    document.querySelectorAll('.sheet-item').forEach(item => item.classList.remove('active'));
    const currentSheet = document.getElementById(`sheet-btn-${idx}`);
    if (currentSheet) currentSheet.classList.add('active');

    document.getElementById('q-num-label').innerText = `第 ${idx + 1} 题`;
    document.getElementById('q-category').innerText = q.category;
    document.getElementById('q-text-label').innerText = q.question;
    renderSign(q);

    const optBox = document.getElementById('options-box');
    optBox.innerHTML = '';
    const userAnswer = userAnswers[q.id];

    q.shuffledOptions.forEach(option => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerHTML = `<span class="option-badge">${option.label}</span> <span>${option.text}</span>`;

      if (hasSubmittedExam) {
        btn.classList.add('locked');
        if (option.label === q.answerLabel) {
          btn.classList.add('correct');
        } else if (option.label === userAnswer) {
          btn.classList.add('incorrect');
        }
      } else {
        if (option.label === userAnswer) btn.classList.add('selected');
        btn.onclick = () => selectOption(option.label);
      }
      optBox.appendChild(btn);
    });

    const expBox = document.getElementById('explanation-box');
    const expText = document.getElementById('explanation-text');
    if (hasSubmittedExam) {
      expBox.style.display = 'block';
      expText.innerText = `正确答案：${q.answerLabel}。${q.hint}`;
    } else {
      expBox.style.display = 'none';
      expText.innerText = '';
    }

    document.getElementById('btn-prev').disabled = idx === 0;
    document.getElementById('btn-next').disabled = idx === activeQuestions.length - 1;
  }

  function selectOption(key) {
    if (hasSubmittedExam) return;
    const q = activeQuestions[currentIdx];
    userAnswers[q.id] = key;
    updateStats();
    initSheet();
    loadQuestion(currentIdx);
  }

  function changeQuestion(dir) {
    const newIdx = currentIdx + dir;
    if (newIdx >= 0 && newIdx < activeQuestions.length) {
      loadQuestion(newIdx);
    }
  }

  function jumpTo(idx) {
    loadQuestion(idx);
  }

  function updateStats() {
    const answeredCount = activeQuestions.filter(q => userAnswers[q.id]).length;
    const correctCount = activeQuestions.filter(q => userAnswers[q.id] === q.answerLabel).length;
    const wrongCount = activeQuestions.filter(q => userAnswers[q.id] && userAnswers[q.id] !== q.answerLabel).length;

    document.getElementById('progress-text').innerText = `${answeredCount} / ${activeQuestions.length}`;
    document.getElementById('stat-correct').innerText = correctCount;
    document.getElementById('stat-wrong').innerText = wrongCount;
  }

  function submitExam(isForced = false) {
    if (hasSubmittedExam) return;
    if (timerInterval) clearInterval(timerInterval);
    hasSubmittedExam = true;
    examTimeLeft = Math.max(0, examTimeLeft);
    updateTimerDisplay();

    const correctCount = activeQuestions.filter(q => userAnswers[q.id] === q.answerLabel).length;
    const answeredCount = activeQuestions.filter(q => userAnswers[q.id]).length;
    const unansweredCount = activeQuestions.length - answeredCount;
    const wrongCount = activeQuestions.length - correctCount - unansweredCount;
    const finalScore = correctCount * 5;

    initSheet();
    updateStats();
    document.getElementById('stat-row').style.display = 'grid';
    document.getElementById('btn-submit').disabled = true;
    document.getElementById('btn-submit').style.display = 'none';
    loadQuestion(currentIdx);

    const modal = document.getElementById('result-modal');
    const scoreVal = document.getElementById('result-score');
    const statusText = document.getElementById('result-status-text');
    const circle = document.getElementById('result-score-circle');
    const details = document.getElementById('result-stat-details');

    scoreVal.innerText = finalScore;
    if (finalScore >= 90) {
      statusText.innerText = '合格';
      statusText.className = 'result-status status-pass';
      circle.style.borderColor = 'var(--success)';
    } else {
      statusText.innerText = '未合格';
      statusText.className = 'result-status status-fail';
      circle.style.borderColor = 'var(--error)';
    }

    const prefix = isForced ? '时间到，系统已强制交卷。' : '已交卷。';
    details.innerText = `${prefix} 答对 ${correctCount} 题，答错 ${wrongCount} 题，未答 ${unansweredCount} 题。每题 5 分，满分 100 分，90 分合格。`;
    modal.style.display = 'flex';

    sendTelegramReport(buildTelegramReportPayload(
      isForced,
      correctCount,
      wrongCount,
      unansweredCount,
      finalScore
    ));
  }

  function closeResultModal() {
    document.getElementById('result-modal').style.display = 'none';
  }

  function restartExam() {
    startNewExam();
  }

  function resetProgress() {
    if (confirm('确定重新开考吗？当前答题记录会清空，并重新随机题目和选项。')) {
      startNewExam();
    }
  }

  function copyReport() {
    const correctCount = activeQuestions.filter(q => userAnswers[q.id] === q.answerLabel).length;
    const wrongQuestions = activeQuestions.filter(q => userAnswers[q.id] && userAnswers[q.id] !== q.answerLabel);
    const unanswered = activeQuestions.filter(q => !userAnswers[q.id]);
    const finalScore = correctCount * 5;
    const passed = finalScore >= 90;
    const now = new Date();
    const dateStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    
    let report = '📊 科目一成绩 · 交通标志专项 (31-50题)\\n';
    report += '交卷时间: ' + dateStr + '\\n';
    report += '分数: ' + finalScore + ' | 合格线: 90 | ' + (passed ? '✅ 合格' : '❌ 未合格') + '\\n';
    report += '答对: ' + correctCount + ' | 答错: ' + wrongQuestions.length + ' | 未答: ' + unanswered.length + '\\n';
    
    if (wrongQuestions.length > 0) {
      report += '\\n错题:\\n';
      wrongQuestions.forEach(q => {
        const userAns = userAnswers[q.id];
        const correctAns = q.answerLabel;
        report += '  Q' + q.id + '(错选' + userAns + '→应为' + correctAns + ') ' + q.options[correctAns] + '\\n';
      });
    }
    if (unanswered.length > 0) {
      report += '\\n未答: ' + unanswered.map(q => 'Q' + q.id).join(', ') + '\\n';
    }
    report += '\\n---\\n来自: Hermes 驾考助手\\n发给 Wing 即可自动更新错题本';
    
    navigator.clipboard.writeText(report).then(() => {
      const btn = event.target;
      const orig = btn.innerText;
      btn.innerText = '✅ 已复制！发给 Wing';
      btn.style.background = '#059669';
      setTimeout(() => { btn.innerText = orig; btn.style.background = '#10b981'; }, 2000);
    }).catch(() => {
      alert('复制失败，请手动截图发送给 Wing');
    });
  }
</script>
